# ADMIN PROJECT SETTINGS
#------------------------------------------------------------------------------
###########[ADMIN BACKEND SETTINGS]################
# Admin backend server port
ADMIN_BACKEND_PORT=8119

# Set true only when the admin frontend is served over HTTPS and ADMIN_FRONTEND_URL has no scheme (host:port).
ADMIN_SSL_ENABLED=false

# Admin frontend base URL (host:port only; the SPA is at /admin/ e.g. http://host:2014/admin/)
# ADMIN_FRONTEND_URL=http://rankwell.eudekify.com
ADMIN_FRONTEND_URL=http://localhost:2018




###########################[ADMIN DATABASE SETTING]###########################
# Central DB (for staging/production)-- replace values & comment
# Admin DB settings
ADMIN_DB_URL=jdbc:mysql://localhost:3306/demoproject_db15?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
ADMIN_DB_USERNAME=superuser
ADMIN_DB_PASSWORD=StrongPass123





# USER PROJECT SETTINGS
# ===================================================================================================================================================================================
############## [USER BACKEND SETTING]##################
# User backend server port # backend server running on this specific port no.*
# Must differ from ADMIN_BACKEND_PORT when both backends run on the same machine.
USER_BACKEND_PORT=8019

# Set true only when the user frontend is served over HTTPS and USER_FRONTEND_URL has no scheme (host:port).
USER_SSL_ENABLED=false

# User frontend base URL (Vite dev: port 2018)
USER_FRONTEND_URL=http://localhost:2019


###########################[USER DATABASE SETTING]###########################
# Central DB (for staging/production)-- replace values & comment
# User DB settings
USER_DB_URL=jdbc:mysql://localhost:3306/demoproject_db15?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
USER_DB_USERNAME=root
USER_DB_PASSWORD=root




# Linux: org files are stored as:
#   ORG_MEDIA_UPLOAD_ROOT / <sanitized_company_folder> / <file>
# Example: /opt/EdTechData/seasec/1730000000000_images_3_.jfif
# The folder name is derived from Organization Name (safe chars only, lowercased).
#
# Deployment: copy this file to /opt/projects/edtech/global-config.properties (see spring.config.import in application.properties), or set OS env ORG_MEDIA_UPLOAD_ROOT=/opt/EdTechData for the JVM.
# Ensure the directory exists and the service user can write: mkdir -p /opt/EdTechData && chown app:app /opt/EdTechData
#
# Local Windows dev: set ORG_MEDIA_UPLOAD_ROOT to a writable folder, e.g. C:/RankwellProject/RankwellCode/Admin/adminBackend
ORG_MEDIA_UPLOAD_ROOT=/opt/EdTechData