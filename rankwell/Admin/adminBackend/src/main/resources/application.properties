spring.application.name=AdminDemoProject
# spring.config.import=optional:file:/opt/projects/rankwell/global-config.properties
# spring.config.import=optional:file:/opt/projects/${COMPANY_NAME:edtech}/global-config.properties

# for locall run application..  
# spring.config.import=optional:file:C:/RankwellProject/RankwellCode/rankwell/global-config.properties

# for linux-server read the file dynamic run application..
spring.config.import=optional:file:../global-config.properties



#spring.datasource.url=jdbc:mysql://localhost:3306/rankwellDemo_db?useSSL=false&serverTimezone=UTC
spring.datasource.url=${ADMIN_DB_URL:jdbc:mysql://localhost:3306/rankwellDemo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ADMIN_DB_USERNAME:root}
spring.datasource.password=${ADMIN_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${ADMIN_BACKEND_PORT:8080}
server.address=0.0.0.0
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Org media: ORG_MEDIA_UPLOAD_ROOT / <company_folder> / <file>  e.g. /opt/EdTechData/seasec/1730..._logo.jfif
# If global-config is not imported, set env: ORG_MEDIA_UPLOAD_ROOT=/opt/EdTechData
org.media.upload-root=${ORG_MEDIA_UPLOAD_ROOT:${user.dir}}

spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=82MB
