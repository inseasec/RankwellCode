spring.application.name=UserDemoProject
# spring.config.import=optional:file:/opt/projects/rankwell/global-config.properties
# spring.config.import=optional:file:/opt/projects/${COMPANY_NAME:edtech}/global-config.properties

# for locall run application.. 
# spring.config.import=optional:file:C:/RankwellProject/RankwellCode/rankwell/global-config.properties  

# for linux-server read the file dynamic run application.. 
spring.config.import=optional:file:../global-config.properties



server.port=${USER_BACKEND_PORT:8081}
server.address=0.0.0.0

# Central DB (from global-config.properties)
spring.datasource.url=${USER_DB_URL:jdbc:mysql://localhost:3306/DemoProject_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${USER_DB_USERNAME:root}
spring.datasource.password=${USER_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 7+ no longer uses MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DB stores org media as <sanitized_company_folder>/file relative to ORG_MEDIA_UPLOAD_ROOT (e.g. seasec/1730..._logo.png).
org.media.upload-root=${ORG_MEDIA_UPLOAD_ROOT:${user.dir}}
