spring.application.name=UserDemoProject
spring.config.import=optional:file:C:/RankwellProject/RankwellCode/global-config.properties
server.port=${USER_BACKEND_PORT:8081}
server.address=0.0.0.0

# Central DB (from global-config.properties)
spring.datasource.url=${USER_DB_URL:jdbc:mysql://localhost:3306/DemoProject_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${USER_DB_USERNAME:root}
spring.datasource.password=${USER_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 7+ no longer uses MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DB stores org logo as paths relative to Admin backend (uploads/rankwellDemoData/...)
org.media.upload-root=${ORG_MEDIA_UPLOAD_ROOT:${user.dir}}
